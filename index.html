<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyxium AI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .view { display: none; }
    .view.active { display: block; }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    /* Galactic glow */
    .galactic-title {
      text-shadow: 0 0 20px #7b2cbf, 0 0 40px #9d4edd;
    }

    /* Canvas background */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex h-screen font-sans">

  <!-- Animated starfield -->
  <canvas id="starfield"></canvas>

  <!-- Sidebar -->
  <div class="w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
    <h2 class="text-2xl font-bold mb-10 text-blue-500 flex items-center gap-2 galactic-title">⚡ Nyxium AI</h2>
    <nav class="space-y-4">
      <button onclick="showView('dashboard')" class="flex items-center gap-3 w-full p-3 bg-slate-800 rounded transition font-semibold">🏠 Dashboard</button>
      <button onclick="showView('chat')" class="flex items-center gap-3 w-full p-3 hover:bg-slate-800 rounded transition">💬 AI Chat</button>
      <a href="https://discord.com/oauth2/authorize?client_id=1497476268847796377&permissions=6755676466969664&integration_type=0&scope=bot+applications.commands" target="_blank" class="flex items-center gap-3 w-full p-3 hover:bg-slate-800 rounded text-indigo-400 font-bold">🤖 Invite Bot</a>
    </nav>
  </div>

  <!-- Main content -->
  <div class="flex-1 p-10 overflow-y-auto">
    <div id="dashboard" class="view active">
      <!-- Your existing dashboard cards remain unchanged -->
      <!-- ... -->
    </div>

    <div id="chat" class="view">
      <!-- Your existing chat UI remains unchanged -->
      <!-- ... -->
    </div>
  </div>

  <!-- JS: Starfield animation -->
  <script>
    const canvas = document.getElementById("starfield");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speed = 0.2 + Math.random() * 0.8;
        this.opacity = 0.2 + Math.random() * 0.8;
      }
      update() {
        this.y += this.speed;
        if (this.y > canvas.height) {
          this.reset();
          this.y = 0;
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.fill();
      }
    }

    const stars = [];
    for (let i = 0; i < 300; i++) stars.push(new Star());

    function animate() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Nebula gradient overlay
      const gradient = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, 0,
        canvas.width/2, canvas.height/2, canvas.width
      );
      gradient.addColorStop(0, "rgba(100,0,150,0.3)");
      gradient.addColorStop(1, "rgba(0,0,0,0.9)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      stars.forEach(star => { star.update(); star.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
