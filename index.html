<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; }
        .view.active { display: block; }
        /* Professional Chat Scrollbar */
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex h-screen">

    <div class="w-64 bg-slate-900 border-r border-slate-800 p-6">
        <h2 class="text-2xl font-bold mb-10 text-blue-500">⚡ Nyxium AI</h2>
        <div class="space-y-4">
            <button onclick="showView('dashboard')" class="w-full text-left p-3 hover:bg-slate-800 rounded">🏠 Dashboard</button>
            <button onclick="showView('chat')" class="w-full text-left p-3 hover:bg-slate-800 rounded">💬 AI Chat</button>
        </div>
    </div>

    <div class="flex-1 p-10 overflow-y-auto">
        <div id="dashboard" class="view active">
            <h1 class="text-4xl font-bold mb-6">Welcome, Commander 👋</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-900 p-8 rounded-3xl border border-indigo-900">
                    <h3 class="font-bold text-xl mb-2">Nyxium AI Status</h3>
                    <p class="text-slate-400 mb-4">Core systems online and ready for deployment.</p>
                    <a href="YOUR_INVITE_LINK" class="bg-indigo-600 px-6 py-3 rounded-xl font-bold">Invite Bot</a>
                </div>
            </div>
        </div>

        <div id="chat" class="view">
            <div class="max-w-3xl bg-slate-900 rounded-3xl border border-slate-800 h-[600px] flex flex-col">
                <div class="p-6 border-b border-slate-800 font-bold">💬 Nyxium Console</div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
                <div class="p-4 border-t border-slate-800 flex gap-2">
                    <input id="user-input" class="flex-1 bg-slate-800 p-3 rounded-xl border border-slate-700" placeholder="Ask Nyxium...">
                    <button onclick="sendToAI()" class="bg-blue-600 px-6 py-2 rounded-xl">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showView(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById(v).classList.add('active');
        }

        async function sendToAI() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-messages');
            if(!input.value) return;

            // User Message
            chat.innerHTML += `<div class="text-right"><div class="inline-block bg-indigo-600 p-3 rounded-2xl rounded-tr-none">${input.value}</div></div>`;
            const msg = input.value;
            input.value = '';

            // Send to API with context
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, context: "You are Nyxium AI, a helpful, witty, and intelligent assistant for Discord server owners." })
            });
            const data = await res.json();

            // AI Response
            chat.innerHTML += `<div class="text-left"><div class="inline-block bg-slate-800 p-3 rounded-2xl rounded-tl-none">${data.reply}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
