<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyxium AI - Premium Discord Bot</title>
    <style>
        :root { --accent: #7000ff; --glow: #00e5ff; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #050508; color: #ffffff; }
        
        /* Flashy Gradient Banner */
        .banner { padding: 80px 20px; text-align: center; background: radial-gradient(circle at top, #1a0b35 0%, #050508 70%); border-bottom: 1px solid #3d1b6e; }
        h1 { font-size: 4rem; margin: 0; background: linear-gradient(90deg, #b066ff, #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5)); }
        
        .container { max-width: 1000px; margin: 30px auto; display: grid; grid-template-columns: 2fr 1fr; gap: 25px; padding: 20px; }
        
        /* Modern Glass Cards */
        .card { background: rgba(19, 19, 31, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(61, 27, 110, 0.5); padding: 25px; border-radius: 20px; transition: 0.3s; }
        .card:hover { border-color: var(--glow); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); }
        
        /* Chat Input Styling */
        #chat-messages { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-bottom: 10px; font-size: 0.9rem; }
        input { width: 70%; padding: 12px; border-radius: 10px; border: 1px solid #3d1b6e; background: #0b0b12; color: white; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--glow); color: #000; }

        /* Fancy Buttons */
        .btn { display: block; background: linear-gradient(90deg, var(--accent), var(--glow)); padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <div class="banner">
        <h1>NYXIUM AI</h1>
        <p>Premium Intelligence for your Discord Server</p>
    </div>

    <div class="container">
        <div class="main-content">
            <div class="card"><h3>🧠 Smart AI Ask</h3><p>Context-aware processing for deep, reliable answers.</p></div>
            <div class="card"><h3>🎨 Creative Draw</h3><p>Generate high-definition AI art instantly.</p></div>
            
            <div class="card">
                <h3>💬 Nyxium AI Chat</h3>
                <div id="chat-messages"></div>
                <input type="text" id="user-input" placeholder="Ask Nyxium AI...">
                <button onclick="sendToAI()">Send</button>
            </div>
        </div>

        <div class="card">
            <h3>Bot Status</h3>
            <p style="color: #00ff9d;">● Online</p>
            <a href="YOUR_LINK_HERE" class="btn">Invite Nyxium</a>
        </div>
    </div>

    <script>
        async function sendToAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-messages');
            if(!input.value) return;
            chatBox.innerHTML += `<p><b>You:</b> ${input.value}</p>`;
            
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: input.value })
            });
            const data = await response.json();
            chatBox.innerHTML += `<p><b>Nyxium AI:</b> ${data.reply}</p>`;
            input.value = '';
        }
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    </script>
</body>
</html>
