<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyxium AI Dashboard</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- External JS libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    .view { display: none; }
    .view.active { display: block; }

    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    /* Galactic glow for title */
    .galactic-title {
      text-shadow: 0 0 20px #7b2cbf, 0 0 40px #9d4edd;
    }

    /* Canvas background */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background: black;
    }

    /* Galaxy Mode starfield */
    body.galaxy-mode {
      background: radial-gradient(circle at center, #0b0033, #000000);
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Starfield background -->
  <canvas id="starfield"></canvas>

  <!-- Dashboard main container -->
  <div id="dashboard" class="p-6">
    <h1 class="text-3xl font-bold galactic-title mb-6">Nyxium AI Dashboard</h1>

    <!-- Views -->
    <div id="chat" class="view active">
      <div id="chat-messages" class="h-96 overflow-y-auto p-4 bg-slate-900 rounded-lg mb-4"></div>
      <div class="flex gap-2">
        <input id="user-input" type="text" placeholder="Type your message..."
          class="flex-1 p-2 rounded-lg bg-slate-800 text-white">
        <button onclick="sendToAI()" class="px-4 py-2 bg-indigo-600 rounded-lg text-white">Send</button>
      </div>
    </div>

    <!-- Buttons -->
    <div class="mt-6 flex gap-4">
      <button id="galaxy-btn" class="px-4 py-2 bg-purple-700 rounded-lg text-white">🌌 Galaxy Mode</button>
      <button id="stats-btn" class="px-4 py-2 bg-blue-700 rounded-lg text-white">📊 View Stats</button>
    </div>
  </div>
  <!-- ✅ Load your JS file last -->
  <script src="src/chat.js"></script>
</body>
</html>
