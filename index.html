<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyxium AI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .view { display: none; }
    .view.active { display: block; }
    body.galaxy-mode { background: radial-gradient(circle at center, #0b0033, #000000); }
    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    
    .cursor-star {
      position: absolute;
      width: 8px; height: 8px;
      background: white; border-radius: 50%;
      pointer-events: none;
      animation: fadeOut 0.8s linear forwards;
    }
    @keyframes fadeOut { to { transform: scale(0); opacity: 0; } }
  </style>
</head>
<body class="bg-[#0f0f12] text-white flex h-screen overflow-hidden">

  <canvas id="starfield"></canvas>

  <aside class="w-64 bg-[#16161a] border-r border-[#222227] p-6 flex flex-col z-10">
    <h2 class="text-xl font-bold mb-8 text-indigo-500">⚡ Nyxium AI</h2>
    <nav class="space-y-4">
      <button onclick="showView('dashboard')" class="block w-full text-left p-2 rounded hover:bg-slate-800">🏠 Dashboard</button>
      <button onclick="showView('chat')" class="block w-full text-left p-2 rounded hover:bg-slate-800">💬 AI Chat</button>
      <div class="border-t border-[#222227] my-4 pt-4">
        <a href="privacy.html" class="block w-full text-left p-2 rounded hover:bg-slate-800 text-sm text-gray-400">🛡️ Privacy Policy</a>
        <a href="terms.html" class="block w-full text-left p-2 rounded hover:bg-slate-800 text-sm text-gray-400">📜 Terms of Service</a>
      </div>
      <button class="mt-auto block w-full text-left p-2 rounded text-indigo-400 font-semibold border border-indigo-900">🤖 Invite Bot</button>
    </nav>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto z-10">
    <div id="dashboard" class="view active">
      <h1 class="text-3xl font-bold mb-8">Dashboard</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-[#16161a] p-6 rounded-xl border border-[#222227]">
          <h3 class="font-bold text-lg mb-2">/ask Command</h3>
          <p class="text-sm text-gray-400 mb-4">Gemini 1.5 Flash powered responses.</p>
          <button onclick="showView('chat')" class="w-full py-2 bg-indigo-600 rounded">Try Asking AI</button>
        </div>
        <div class="bg-[#16161a] p-6 rounded-xl border border-[#222227]">
          <h3 class="font-bold text-lg mb-2">Galaxy Mode</h3>
          <p class="text-sm text-gray-400 mb-4">Immersive space animations.</p>
          <button id="galaxy-btn" class="w-full py-2 bg-purple-700 rounded">Activate Galaxy</button>
        </div>
      </div>
    </div>

    <div id="chat" class="view">
      <h1 class="text-3xl font-bold mb-6">AI Chat</h1>
      <div id="chat-messages" class="h-96 overflow-y-auto p-4 bg-[#1a1b26] rounded-lg mb-4 border border-[#222227]"></div>
      <div class="flex gap-2">
        <input id="user-input" type="text" class="flex-1 p-3 rounded-lg bg-[#16161a] border border-[#222227]">
        <button onclick="sendToAI()" class="px-6 py-2 bg-indigo-600 rounded-lg">Send</button>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('mousemove', (e) => {
      const star = document.createElement('div');
      star.className = 'cursor-star';
      star.style.left = e.pageX + 'px';
      star.style.top = e.pageY + 'px';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 800);
    });

    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let isGalaxyMode = false;

    document.getElementById('galaxy-btn').addEventListener('click', () => {
      isGalaxyMode = !isGalaxyMode;
      document.body.classList.toggle('galaxy-mode');
      if(isGalaxyMode) animateStars();
    });

    function animateStars() {
      if(!isGalaxyMode) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      requestAnimationFrame(animateStars);
    }

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
