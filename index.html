<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="max-w-2xl w-full mx-4 p-6 bg-white rounded-xl shadow-lg border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Nyxium AI</h1>
        
        <div class="text-center mb-6">
            <a href="https://discord.com/oauth2/authorize?client_id=1497476268847796377&permissions=6755676466969664&integration_type=0&scope=bot+applications.commands" 
               target="_blank"
               class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-full font-medium hover:bg-indigo-700 transition">
               Invite Nyxium AI to Discord
            </a>
        </div>
        
        <div id="chat-messages" class="h-96 overflow-y-auto space-y-4 mb-6 p-4 bg-gray-50 rounded-lg border border-gray-100">
            </div>

        <div class="flex gap-2">
            <input id="user-input" 
                   class="flex-1 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                   placeholder="Ask Nyxium something...">
            <button onclick="sendToAI()" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Send
            </button>
        </div>
    </div>

    <script>
        async function sendToAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-messages');
            if(!input.value) return;
            
            chatBox.innerHTML += `<p class="text-right text-gray-700"><b>You:</b> ${input.value}</p>`;
            
            const userMsg = input.value;
            input.value = '';
            
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMsg })
            });
            const data = await response.json();
            
            const htmlReply = marked.parse(data.reply);
            chatBox.innerHTML += `<div class="bg-blue-50 p-3 rounded-lg text-gray-800"><b>Nyxium AI:</b> ${htmlReply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
