<!-- AI Chat View with New Command Utilities Integration -->
    <div id="chat" class="view">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-6">
          <div class="flex items-center justify-center bg-white/5 border border-white/10 w-24 h-24 rounded-2xl">
            <span id="ai-face" class="emoji-avatar idle-pulse">😐</span>
          </div>
          <div>
            <h2 class="text-3xl font-bold">Nyxium Console</h2>
            <p id="ai-status" class="text-gray-400 text-sm mt-1">Status: Chilling</p>
          </div>
        </div>

        <!-- NEW: Action Commands Toolbar -->
        <div class="flex items-center gap-3 bg-white/5 border border-white/10 p-2 rounded-xl self-start md:self-auto">
          <button onclick="executeConsoleCommand('/clear')" class="px-3 py-1.5 text-xs font-semibold bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg transition flex items-center gap-1.5 border border-red-500/20">
            🗑️ /clear
          </button>
          <button onclick="executeConsoleCommand('/toggle-sass')" class="px-3 py-1.5 text-xs font-semibold bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 rounded-lg transition flex items-center gap-1.5 border border-amber-500/20">
            🎭 /toggle-sass
          </button>
        </div>
      </div>

      <div id="ai-tip-box"></div>
      <div id="chat-messages" class="h-[45vh] overflow-y-auto p-6 mb-4 space-y-4 bg-white/5 rounded-xl border border-white/10"></div>
      
      <div class="flex gap-4">
        <input id="user-input" type="text" placeholder="Ask Nyxium something or type a command..." class="flex-1 bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-indigo-500" onkeydown="if(event.key === 'Enter') sendToAI()">
        <button onclick="sendToAI()" class="px-8 py-4 bg-indigo-600 rounded-xl font-bold hover:bg-indigo-500 transition">Send</button>
      </div>
    </div>
