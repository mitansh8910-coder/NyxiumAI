<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyxium AI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .view { display: none; }
    .view.active { display: block; }
    body.galaxy-mode { background: radial-gradient(circle at center, #0b0033, #000000); }
  </style>
</head>
<body class="bg-[#0f0f12] text-white flex h-screen overflow-hidden">

  <aside class="w-64 bg-[#16161a] border-r border-[#222227] p-6 flex flex-col">
    <h2 class="text-xl font-bold mb-8 text-indigo-500">⚡ Nyxium AI</h2>
    <nav class="space-y-4">
      <button onclick="showView('dashboard')" class="block w-full text-left p-2 rounded hover:bg-slate-800">🏠 Dashboard</button>
      <button onclick="showView('chat')" class="block w-full text-left p-2 rounded hover:bg-slate-800">💬 AI Chat</button>
      <button class="block w-full text-left p-2 rounded text-indigo-400 font-semibold">🤖 Invite Bot</button>
    </nav>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    
    <div id="dashboard" class="view active">
      <h1 class="text-3xl font-bold mb-8">Dashboard</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-[#16161a] p-6 rounded-xl border border-[#222227]">
          <h3 class="font-bold text-lg mb-2">/ask Command</h3>
          <p class="text-sm text-gray-400 mb-4">Leverage Gemini 1.5 Flash for accurate responses.</p>
          <button onclick="showView('chat')" class="w-full py-2 bg-indigo-600 rounded">Try Asking AI</button>
        </div>
        <div class="bg-[#16161a] p-6 rounded-xl border border-[#222227]">
          <h3 class="font-bold text-lg mb-2">Galaxy Mode</h3>
          <p class="text-sm text-gray-400 mb-4">Enable immersive starfield animations.</p>
          <button id="galaxy-btn" class="w-full py-2 bg-purple-700 rounded">Activate Galaxy</button>
        </div>
        <div class="bg-[#16161a] p-6 rounded-xl border border-[#222227]">
          <h3 class="font-bold text-lg mb-2">Analytics</h3>
          <p class="text-sm text-gray-400 mb-4">Track usage and monitor AI queries.</p>
          <button class="w-full py-2 bg-blue-700 rounded">View Stats</button>
        </div>
      </div>
    </div>

    <div id="chat" class="view">
      <h1 class="text-3xl font-bold mb-6">AI Chat</h1>
      <div id="chat-messages" class="h-96 overflow-y-auto p-4 bg-[#1a1b26] rounded-lg mb-4 border border-[#222227]"></div>
      <div class="flex gap-2">
        <input id="user-input" type="text" placeholder="Type your message..." class="flex-1 p-3 rounded-lg bg-[#16161a] border border-[#222227]">
        <button onclick="sendToAI()" class="px-6 py-2 bg-indigo-600 rounded-lg">Send</button>
      </div>
    </div>
  </main>

  <script>
    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }

    document.getElementById('galaxy-btn').addEventListener('click', () => {
      document.body.classList.toggle('galaxy-mode');
    });

    function sendToAI() {
      const input = document.getElementById('user-input');
      const messages = document.getElementById('chat-messages');
      if (input.value) {
        messages.innerHTML += `<div class="p-2 bg-indigo-600 rounded my-2 self-end">${input.value}</div>`;
        input.value = '';
      }
    }
  </script>
</body>
</html>
